name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            backend/target
            ~/.cargo/registry
            ~/.cargo/git
          key: rust-${{ hashFiles('backend/Cargo.lock', 'backend/Cargo.toml') }}
          restore-keys: rust-

      - name: Check formatting
        working-directory: backend
        run: cargo fmt -- --check

      - name: Clippy lints
        working-directory: backend
        run: cargo clippy --release -- -D warnings

      - name: Build
        working-directory: backend
        run: cargo build --release

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: node-${{ hashFiles('frontend/package-lock.json', 'frontend/package.json') }}
          restore-keys: node-

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: ESLint
        working-directory: frontend
        run: npx eslint . --max-warnings 2

      - name: Build
        working-directory: frontend
        run: npm run build
